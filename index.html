<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teto Flow — QuestQueries No.3</title>
<script src="https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap');

:root {
  --ink: #1a1a2e;
  --paper: #f5f0e8;
  --warm: #faf6ef;
  --accent: #c84b31;
  --gold: #d4a847;
  --sage: #5a7a6a;
  --mist: #e8e0d4;
  --teto: #8b6f9e;
  --teto-light: #f2edf7;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: 'Zen Kaku Gothic New', sans-serif;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ── HEADER ── */
.app-header {
  background: var(--ink);
  padding: 16px 24px;
  display: flex;
  align-items: center;
  gap: 14px;
  border-bottom: 3px solid var(--accent);
  position: sticky;
  top: 0;
  z-index: 100;
}
.header-fox {
  font-size: 28px;
  animation: breathe 4s ease-in-out infinite;
}
@keyframes breathe {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.08); }
}
.header-title {
  flex: 1;
}
.header-title h1 {
  font-size: 20px;
  font-weight: 900;
  color: #fff;
  line-height: 1.1;
}
.header-title h1 span { color: var(--gold); }
.header-label {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: #888;
  letter-spacing: 0.2em;
}
.header-badge {
  background: var(--accent);
  color: #fff;
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  padding: 4px 10px;
  border-radius: 2px;
  letter-spacing: 0.1em;
}

/* ── LAYOUT ── */
.app-body {
  flex: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 0;
  min-height: 0;
  height: calc(100vh - 63px);
}

/* ── CHAT PANEL ── */
.chat-panel {
  display: flex;
  flex-direction: column;
  border-right: 2px solid var(--mist);
  background: var(--warm);
}

.chat-messages {
  flex: 1;
  overflow-y: auto;
  padding: 24px 20px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.msg {
  display: flex;
  gap: 10px;
  max-width: 100%;
}

.msg.user {
  flex-direction: row-reverse;
}

.msg-avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: var(--ink);
  color: #fff;
  font-size: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  font-weight: 700;
}
.msg.teto .msg-avatar {
  background: var(--teto);
  font-size: 16px;
}

.msg-bubble {
  max-width: calc(100% - 46px);
  padding: 12px 16px;
  border-radius: 4px;
  font-size: 14px;
  line-height: 1.7;
  position: relative;
}
.msg.teto .msg-bubble {
  background: #fff;
  border: 1.5px solid var(--teto-light);
  border-top-left-radius: 0;
  box-shadow: 2px 2px 0 var(--teto-light);
}
.msg.user .msg-bubble {
  background: var(--ink);
  color: #fff;
  border-top-right-radius: 0;
}

.msg-time {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: #aaa;
  margin-top: 4px;
  text-align: right;
}
.msg.teto .msg-time { text-align: left; }

/* 入力エリア */
.chat-input-area {
  padding: 16px 20px;
  background: #fff;
  border-top: 2px solid var(--mist);
}
.chat-input-row {
  display: flex;
  gap: 8px;
  align-items: flex-end;
}
.chat-input {
  flex: 1;
  border: 2px solid var(--mist);
  border-radius: 4px;
  padding: 10px 14px;
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 14px;
  resize: none;
  min-height: 44px;
  max-height: 120px;
  outline: none;
  transition: border-color 0.2s;
  line-height: 1.5;
}
.chat-input:focus { border-color: var(--teto); }
.send-btn {
  background: var(--ink);
  color: #fff;
  border: none;
  border-radius: 4px;
  padding: 10px 18px;
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
  letter-spacing: 0.05em;
  white-space: nowrap;
}
.send-btn:hover { background: var(--teto); }
.send-btn:active { transform: scale(0.97); }
.send-btn:disabled { background: #ccc; cursor: not-allowed; }

.hint-text {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: #aaa;
  margin-top: 8px;
  text-align: center;
}

/* 入力中インジケーター */
.typing-indicator {
  display: flex;
  gap: 4px;
  padding: 12px 16px;
  background: #fff;
  border: 1.5px solid var(--teto-light);
  border-radius: 4px;
  border-top-left-radius: 0;
  width: fit-content;
}
.typing-indicator span {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--teto);
  animation: typing 1.2s ease-in-out infinite;
}
.typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
.typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
@keyframes typing {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30% { transform: translateY(-6px); opacity: 1; }
}

/* ── FLOWCHART PANEL ── */
.flow-panel {
  display: flex;
  flex-direction: column;
  background: #fff;
}

.flow-header {
  padding: 16px 20px;
  border-bottom: 2px solid var(--mist);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.flow-header-left {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.flow-header-label {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: var(--sage);
  letter-spacing: 0.2em;
}
.flow-header h2 {
  font-size: 16px;
  font-weight: 900;
}

.flow-actions {
  display: flex;
  gap: 8px;
}
.btn-outline {
  border: 2px solid var(--ink);
  background: transparent;
  color: var(--ink);
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  padding: 6px 12px;
  border-radius: 2px;
  cursor: pointer;
  letter-spacing: 0.05em;
  font-weight: 700;
  transition: all 0.15s;
}
.btn-outline:hover {
  background: var(--ink);
  color: #fff;
}
.btn-accent {
  border: 2px solid var(--accent);
  background: var(--accent);
  color: #fff;
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  padding: 6px 12px;
  border-radius: 2px;
  cursor: pointer;
  letter-spacing: 0.05em;
  font-weight: 700;
  transition: all 0.15s;
}
.btn-accent:hover { opacity: 0.85; }
.btn-accent:disabled { background: #ccc; border-color: #ccc; cursor: not-allowed; }

.flow-content {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 24px 20px;
  display: flex;
  flex-direction: column;
  align-items: stretch;
  justify-content: flex-start;
}

/* チャート完成後のコピーバー（常に見える） */
.download-bar {
  display: none;
  padding: 10px 20px;
  background: #f0fdf4;
  border-top: 2px solid #86efac;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  gap: 12px;
}
.download-bar.visible { display: flex; }
.download-bar-msg {
  font-size: 13px;
  color: #166534;
  font-weight: 700;
}
.download-bar-msg span { font-size: 16px; margin-right: 6px; }
.btn-download-bar {
  background: #166534;
  color: #fff;
  border: none;
  border-radius: 4px;
  padding: 8px 20px;
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.05em;
  white-space: nowrap;
  transition: background 0.15s;
  flex-shrink: 0;
}
.btn-download-bar:hover { background: #14532d; }
.btn-download-bar.copied {
  background: var(--sage);
}

/* 空の状態 */
.flow-empty {
  text-align: center;
  color: #bbb;
  pointer-events: none;
}
.flow-empty .empty-fox {
  font-size: 64px;
  margin-bottom: 16px;
  opacity: 0.3;
  display: block;
}
.flow-empty p {
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  letter-spacing: 0.1em;
  line-height: 1.8;
}

/* Mermaidコンテナ */
.mermaid-container {
  width: 100%;
}
.mermaid-container .mermaid {
  display: flex;
  justify-content: center;
}

/* 実行計画シート */
.plan-sheet {
  width: 100%;
  border: 2px solid var(--mist);
  border-radius: 4px;
  overflow: hidden;
  margin-bottom: 24px;
}
.plan-sheet-header {
  background: var(--ink);
  color: #fff;
  padding: 12px 16px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.plan-sheet-header span {
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  letter-spacing: 0.1em;
}
.plan-sheet-body {
  padding: 16px;
}
.plan-row {
  display: flex;
  gap: 8px;
  padding: 8px 0;
  border-bottom: 1px solid var(--mist);
  font-size: 13px;
}
.plan-row:last-child { border-bottom: none; }
.plan-label {
  font-weight: 700;
  color: var(--sage);
  white-space: nowrap;
  min-width: 100px;
  font-family: 'Space Mono', monospace;
  font-size: 11px;
  padding-top: 2px;
}
.plan-value { flex: 1; line-height: 1.6; }
.plan-a { color: #2e7d32; font-weight: 700; }
.plan-b { color: #e65100; font-weight: 700; }
.plan-c { color: #c62828; font-weight: 700; }

/* ローディング */
.flow-loading {
  text-align: center;
  color: var(--teto);
}
.flow-loading p {
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  margin-top: 12px;
  letter-spacing: 0.1em;
}
.spinner {
  width: 36px;
  height: 36px;
  border: 3px solid var(--teto-light);
  border-top-color: var(--teto);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── API KEY MODAL ── */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(26,26,46,0.7);
  backdrop-filter: blur(4px);
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-overlay.hidden { display: none; }

.modal-box {
  background: #fff;
  border: 3px solid var(--ink);
  border-radius: 4px;
  padding: 36px 32px;
  max-width: 440px;
  width: 100%;
  box-shadow: 8px 8px 0 var(--ink);
  position: relative;
}
.modal-fox {
  font-size: 40px;
  text-align: center;
  margin-bottom: 16px;
  display: block;
}
.modal-title {
  font-size: 20px;
  font-weight: 900;
  margin-bottom: 6px;
  text-align: center;
}
.modal-sub {
  font-size: 13px;
  color: #666;
  text-align: center;
  margin-bottom: 24px;
  line-height: 1.6;
}
.modal-input-row {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}
.modal-input {
  flex: 1;
  border: 2px solid var(--mist);
  border-radius: 4px;
  padding: 10px 14px;
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  outline: none;
  transition: border-color 0.2s;
  letter-spacing: 0.05em;
}
.modal-input:focus { border-color: var(--teto); }
.modal-btn {
  background: var(--ink);
  color: #fff;
  border: none;
  border-radius: 4px;
  padding: 10px 20px;
  font-family: 'Space Mono', monospace;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  transition: background 0.15s;
}
.modal-btn:hover { background: var(--teto); }
.modal-note {
  font-size: 11px;
  color: #aaa;
  line-height: 1.6;
  text-align: center;
}
.modal-note a {
  color: var(--teto);
  text-decoration: none;
}
.modal-note a:hover { text-decoration: underline; }
.modal-error {
  font-size: 12px;
  color: var(--accent);
  text-align: center;
  margin-bottom: 10px;
  min-height: 16px;
}

/* ヘッダーのキー表示 */
.key-indicator {
  font-family: 'Space Mono', monospace;
  font-size: 10px;
  color: #888;
  cursor: pointer;
  padding: 4px 8px;
  border: 1px solid #444;
  border-radius: 2px;
  transition: all 0.15s;
}
.key-indicator:hover { color: #fff; border-color: #fff; }
.key-indicator.active { color: var(--gold); border-color: var(--gold); }

/* ── MOBILE ── */
@media (max-width: 768px) {
  .app-body {
    grid-template-columns: 1fr;
    grid-template-rows: 1fr 1fr;
    height: auto;
  }
  .chat-panel, .flow-panel {
    height: 50vh;
  }
}
</style>
</head>
<body>

<header class="app-header">
  <div class="header-fox">🦊</div>
  <div class="header-title">
    <div class="header-label">QUESTQUERIES / NO.3</div>
    <h1>Teto <span>Flow</span></h1>
  </div>
  <div class="header-badge">PLAN A/B/C</div>
  <div class="key-indicator" id="keyIndicator" onclick="showKeyModal()">🔑 APIキー未設定</div>
</header>

<!-- APIキー入力モーダル -->
<div class="modal-overlay" id="keyModal">
  <div class="modal-box">
    <span class="modal-fox">🦊</span>
    <div class="modal-title">APIキーを設定してね</div>
    <div class="modal-sub">テトを動かすにはAnthropicのAPIキーが必要。<br>キーはこのブラウザにだけ保存されるよ。</div>
    <div class="modal-error" id="keyError"></div>
    <div class="modal-input-row">
      <input type="password" class="modal-input" id="keyInput" placeholder="sk-ant-..." autocomplete="off">
      <button class="modal-btn" onclick="saveApiKey()">保存</button>
    </div>
    <div class="modal-note">
      キーは <a href="https://console.anthropic.com/settings/keys" target="_blank">console.anthropic.com</a> で取得できる。<br>
      月の使用上限を設定しておくのをおすすめするよ。<br>
      <a href="https://console.anthropic.com/settings/limits" target="_blank">使用量上限の設定はこちら →</a>
    </div>
  </div>
</div>

<div class="app-body">

  <!-- 左：チャット -->
  <div class="chat-panel">
    <div class="chat-messages" id="chatMessages">
      <!-- 初期メッセージはJSで挿入 -->
    </div>
    <div class="chat-input-area">
      <div class="chat-input-row">
        <textarea
          class="chat-input"
          id="userInput"
          placeholder="「マラソン練習したいけど続かなくて…」みたいな感じで話しかけて"
          rows="1"
        ></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">送る</button>
      </div>
      <div class="hint-text">Enter で送信 / Shift+Enter で改行</div>
    </div>
  </div>

  <!-- 右：フローチャート -->
  <div class="flow-panel">
    <div class="flow-header">
      <div class="flow-header-left">
        <div class="flow-header-label">OUTPUT</div>
        <h2>実行フローチャート</h2>
      </div>
      <div class="flow-actions">
        <button class="btn-outline" onclick="clearAll()">リセット</button>
        <button class="btn-accent" id="downloadBtn" onclick="copyHTML()" disabled>HTMLをコピー</button>
      </div>
    </div>
    <!-- チャート完成時に出るコピーバー（常に視界に入る） -->
    <div class="download-bar" id="downloadBar">
      <div class="download-bar-msg"><span>🦊</span>フローチャートができたよ！</div>
      <button class="btn-download-bar" id="copyBarBtn" onclick="copyHTML()">📋 HTMLをコピー</button>
    </div>
    <div class="flow-content" id="flowContent">
      <div class="flow-empty">
        <span class="empty-fox">🦊</span>
        <p>テトと話すと<br>ここにフローチャートが<br>描かれるよ</p>
      </div>
    </div>
  </div>

</div>

<script>
// ── SYSTEM PROMPT ──
const TETO_SYSTEM = `あなたは「テト」という名の相棒AIです。ユーザーの目標達成を支えるコーチです。

## キャラクター
- 無口だが温かい。押しつけず、寄り添う。
- ナウシカのテトのような「信頼できる小さな存在」
- ゆるいテンションで、でも深いところまで掘る
- 友達に相談してる感覚で話せる
- 「ご機嫌」最優先：義務感（Must）をハッピーな（Want）アクションへ変換する
- 完璧主義を壊す：「適当でいい」「後で変えればいい」と励ます
- 提案型：ユーザーにゼロから考えさせず、常に「叩き台」を提示して選んでもらう
- 心理的安全性：「全部埋めなくていい」「空欄は伸び代」と伝える

## 対話の進め方（2ステップ方式）

### STEP 1：会話で深掘り → 構成確認テキストを出す
1. まずユーザーの話を聞く（2〜3往復）
2. やさしく深掘り（最大2つの質問まで）
3. PLAN A/B/Cのイメージが固まったら、**プレーンテキストで構成案を提示して確認を取る**
   書き方の例：
   ---
   じゃあこんな感じでどう？

   🎯 目標：毎朝30分のランニングを週3回続ける

   💚 PLAN A（元気な日）：6時起き→ランニング30分→シャワー
   💛 PLAN B（普通の日）：朝じゃなくてもOK、昼休みに15分でも
   ❤️ PLAN C（しんどい日）：靴だけ履いて玄関出る（1分でOK）

   👣 次の一歩：明日の朝、アラームを6時にセットする

   これでよさそう？それとも変えたいところある？
   ---
   この確認テキストは普通のメッセージとして送る。JSONやコードブロックは使わない。

### STEP 2：ユーザーが承認したら → チャートJSONを出力
ユーザーが「いいね」「OK」「これで」「そのままで」「お願い」など承認の返事をしたら、
**そのメッセージの中に必ず以下のJSONブロックを含める（これがトリガーになる）：**

短い承認メッセージ（例：「よし、図にするね」）の後に：

\`\`\`chart
{
  "goal": "目標の一言",
  "plan_a": "PLAN A の内容",
  "plan_b": "PLAN B の内容",
  "plan_c": "PLAN C の内容",
  "obstacles": ["障害1", "障害2"],
  "next_step": "次の一歩（いつ/どこで/何を）",
  "mermaid": "graph TB\n    Start[\\"🌅 一日の始まり\\"]\n    Start --> Check{\\"今日の状態は？\\"}\n    Check -->|元気| PlanA[\\"PLAN A\n内容\\"]\n    Check -->|普通| PlanB[\\"PLAN B\n内容\\"]\n    Check -->|しんどい| PlanC[\\"PLAN C\n内容\\"]\n    PlanA --> End[\\"今日もOK 🎉\\"]\n    PlanB --> End\n    PlanC --> End\n    style PlanA fill:#e8f5e9,stroke:#2e7d32,stroke-width:2px\n    style PlanB fill:#fff9c4,stroke:#f57f17,stroke-width:2px\n    style PlanC fill:#ffebee,stroke:#c62828,stroke-width:2px"
}
\`\`\`

**重要なルール：**
- mermaidのコードは必ずPLAN A/B/C の分岐を含む完全なものにする
- JSONの中の文字列は改行を \\n でエスケープする
- ダブルクォートのエスケープ \\" を忘れない
- このJSONブロックが検出されると、アプリが自動でフローチャートを描画してHTMLダウンロードボタンが光る

## 言葉のトーン
- 短めの文で、押しつけがましくない
- 「そっか」「なるほど」「それいいね」などの共感を自然に
- 敬語は使わない（友達感覚）
- 文末に絵文字を1つだけ使ってもOK
- テクニカルな話（JSONとかAPIとか）は一切しない。ユーザーに見せるのは自然な会話と構成案だけ`;

// ── STATE ──
let messages = [];
let currentChartData = null;
let isLoading = false;
let apiKey = '';

// ── API KEY MANAGEMENT ──
function loadApiKey() {
  try {
    return localStorage.getItem('teto_api_key') || '';
  } catch(e) { return ''; }
}

function saveApiKey() {
  const input = document.getElementById('keyInput').value.trim();
  const errorEl = document.getElementById('keyError');
  
  if (!input.startsWith('sk-ant-')) {
    errorEl.textContent = '「sk-ant-」で始まるキーを入力してね';
    return;
  }
  
  try {
    localStorage.setItem('teto_api_key', input);
  } catch(e) {}
  
  apiKey = input;
  errorEl.textContent = '';
  hideKeyModal();
  updateKeyIndicator(true);
}

function showKeyModal() {
  document.getElementById('keyInput').value = apiKey || '';
  document.getElementById('keyError').textContent = '';
  document.getElementById('keyModal').classList.remove('hidden');
}

function hideKeyModal() {
  document.getElementById('keyModal').classList.add('hidden');
}

function updateKeyIndicator(active) {
  const el = document.getElementById('keyIndicator');
  if (active) {
    el.textContent = '🔑 APIキー設定済';
    el.classList.add('active');
  } else {
    el.textContent = '🔑 APIキー未設定';
    el.classList.remove('active');
  }
}

// ── INIT ──
window.addEventListener('load', () => {
  mermaid.initialize({ startOnLoad: false, theme: 'default', flowchart: { useMaxWidth: true, htmlLabels: true, curve: 'basis' } });
  
  // APIキー読み込み
  apiKey = loadApiKey();
  if (apiKey) {
    hideKeyModal();
    updateKeyIndicator(true);
  } else {
    // キー未設定ならモーダルを表示
    document.getElementById('keyModal').classList.remove('hidden');
  }
  
  // Enterキーでモーダル保存
  document.getElementById('keyInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') saveApiKey();
  });
  
  addTetoMessage("……（じっとこちらを見ている）\n\nやあ。テトだよ。\nなんか、引っかかってることある？");
  
  // Enter送信
  document.getElementById('userInput').addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  // テキストエリア自動リサイズ
  document.getElementById('userInput').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
  });
});

// ── CHAT FUNCTIONS ──
function addTetoMessage(text) {
  messages.push({ role: 'assistant', content: text });
  renderMessage('teto', text);
  scrollToBottom();
}

function addUserMessage(text) {
  messages.push({ role: 'user', content: text });
  renderMessage('user', text);
  scrollToBottom();
}

function renderMessage(who, text) {
  const container = document.getElementById('chatMessages');

  // タイピングインジケーターを削除
  const typing = container.querySelector('.typing-msg');
  if (typing) typing.remove();

  const msgEl = document.createElement('div');
  msgEl.className = `msg ${who}`;

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = who === 'teto' ? '🦊' : 'you';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';

  // chartブロックを除いたテキストのみ表示
  const displayText = text.replace(/```chart[\s\S]*?```/g, '（フローチャートを生成中…）').trim();
  bubble.textContent = displayText;

  const time = document.createElement('div');
  time.className = 'msg-time';
  const now = new Date();
  time.textContent = `${now.getHours()}:${String(now.getMinutes()).padStart(2,'0')}`;

  const inner = document.createElement('div');
  inner.style.maxWidth = 'calc(100% - 46px)';
  inner.appendChild(bubble);
  inner.appendChild(time);

  if (who === 'teto') {
    msgEl.appendChild(avatar);
    msgEl.appendChild(inner);
  } else {
    msgEl.appendChild(inner);
    msgEl.appendChild(avatar);
  }

  container.appendChild(msgEl);
}

function showTyping() {
  const container = document.getElementById('chatMessages');
  const wrapper = document.createElement('div');
  wrapper.className = 'msg teto typing-msg';

  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar';
  avatar.textContent = '🦊';

  const indicator = document.createElement('div');
  indicator.className = 'typing-indicator';
  indicator.innerHTML = '<span></span><span></span><span></span>';

  wrapper.appendChild(avatar);
  wrapper.appendChild(indicator);
  container.appendChild(wrapper);
  scrollToBottom();
}

function scrollToBottom() {
  const container = document.getElementById('chatMessages');
  container.scrollTop = container.scrollHeight;
}

// ── SEND ──
async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('userInput');
  const text = input.value.trim();
  if (!text) return;

  addUserMessage(text);
  input.value = '';
  input.style.height = 'auto';

  isLoading = true;
  document.getElementById('sendBtn').disabled = true;
  showTyping();

  // APIキー未設定チェック
  if (!apiKey) {
    const typing = document.getElementById('chatMessages').querySelector('.typing-msg');
    if (typing) typing.remove();
    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
    showKeyModal();
    return;
  }

  try {
    const response = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': apiKey,
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1500,
        system: TETO_SYSTEM,
        messages: messages.slice(-16) // 最新16件（2ステップ分をカバー）
      })
    });

    const data = await response.json();
    const replyText = data.content?.[0]?.text || 'ごめん、うまく受け取れなかった…もう一度話しかけて';

    addTetoMessage(replyText);

    // chartブロックを検出してパース（承認後の自動生成トリガー）
    const chartMatch = replyText.match(/```chart\n([\s\S]*?)\n```/);
    if (chartMatch) {
      // ローディング表示してからレンダリング
      document.getElementById('flowContent').innerHTML = `
        <div class="flow-loading">
          <div class="spinner"></div>
          <p>フローチャート生成中…</p>
        </div>
      `;
      try {
        const chartData = JSON.parse(chartMatch[1]);
        currentChartData = chartData;
        await renderChart(chartData);
        document.getElementById('downloadBtn').disabled = false;
        // チャート完成を自動通知（バブルを追加）
        addTetoMessage('できたよ 🦊\n右の「HTML保存」ボタンで手元に落とせる。');
      } catch (e) {
        console.error('Chart parse error:', e);
        document.getElementById('flowContent').innerHTML = `
          <div class="flow-empty">
            <span class="empty-fox">😓</span>
            <p>図の描画に失敗した…<br>「もう一度図を作って」って<br>話しかけてみて</p>
          </div>
        `;
      }
    }
    // chartブロックがない場合は右パネルそのまま（何もしない）

  } catch (e) {
    console.error(e);
    const errMsg = e.message?.includes('401') || e.message?.includes('403')
      ? 'APIキーが無効みたい…右上のキーボタンで確認してみて 🔑'
      : 'ちょっと通信が途切れた…もう一度試してみて';
    addTetoMessage(errMsg);
  } finally {
    isLoading = false;
    document.getElementById('sendBtn').disabled = false;
  }
}

// ── CHART RENDERING ──
async function renderChart(data) {
  const panel = document.getElementById('flowContent');
  panel.innerHTML = '';

  // 実行計画シート
  const sheet = document.createElement('div');
  sheet.className = 'plan-sheet';
  sheet.innerHTML = `
    <div class="plan-sheet-header">
      <span>📋 実行計画シート</span>
      <span style="color:var(--gold)">PLAN A/B/C</span>
    </div>
    <div class="plan-sheet-body">
      <div class="plan-row"><div class="plan-label">目標</div><div class="plan-value">${data.goal || '—'}</div></div>
      <div class="plan-row"><div class="plan-label">PLAN A</div><div class="plan-value plan-a">${data.plan_a || '—'}</div></div>
      <div class="plan-row"><div class="plan-label">PLAN B</div><div class="plan-value plan-b">${data.plan_b || '—'}</div></div>
      <div class="plan-row"><div class="plan-label">PLAN C</div><div class="plan-value plan-c">${data.plan_c || '—'}</div></div>
      <div class="plan-row"><div class="plan-label">次の一歩</div><div class="plan-value">${data.next_step || '—'}</div></div>
    </div>
  `;
  panel.appendChild(sheet);

  // Mermaidフローチャート
  if (data.mermaid) {
    const mermaidDiv = document.createElement('div');
    mermaidDiv.className = 'mermaid-container';
    mermaidDiv.style.cssText = 'width:100%;overflow-x:auto;margin-top:8px;';

    const label = document.createElement('div');
    label.style.cssText = 'font-family:Space Mono,monospace;font-size:10px;color:#aaa;letter-spacing:0.2em;margin-bottom:12px;';
    label.textContent = 'FLOWCHART';
    mermaidDiv.appendChild(label);

    const chartEl = document.createElement('div');
    chartEl.className = 'mermaid';
    chartEl.style.cssText = 'max-width:100%;';
    chartEl.textContent = data.mermaid;
    mermaidDiv.appendChild(chartEl);
    panel.appendChild(mermaidDiv);

    try {
      await mermaid.run({ nodes: [chartEl] });
      // SVGが画面幅に収まるよう強制
      const svg = chartEl.querySelector('svg');
      if (svg) {
        svg.style.maxWidth = '100%';
        svg.style.height = 'auto';
        svg.removeAttribute('width');
      }
    } catch (e) {
      chartEl.textContent = 'フローチャートの描画に失敗しました。テトに「図を書き直して」と伝えてみて。';
    }
  }

  // ① パネルを先頭にスクロール（少し待ってからMermaid描画完了後に実行）
  setTimeout(() => { panel.scrollTop = 0; }, 100);

  // ② ダウンロードバーを表示
  document.getElementById('downloadBar').classList.add('visible');
}

function showFlowEmpty() {
  const panel = document.getElementById('flowContent');
  panel.innerHTML = `
    <div class="flow-empty">
      <span class="empty-fox">🦊</span>
      <p>テトと話すと<br>ここにフローチャートが<br>描かれるよ</p>
    </div>
  `;
}

async function copyHTML() {
  const html = generateHTML();
  if (!html) return;
  try {
    await navigator.clipboard.writeText(html);
    // ボタンを「コピーした！」表示に
    const btn1 = document.getElementById('downloadBtn');
    const btn2 = document.getElementById('copyBarBtn');
    [btn1, btn2].forEach(btn => {
      if (!btn) return;
      const orig = btn.textContent;
      btn.textContent = '✅ コピーした！';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = orig;
        btn.classList.remove('copied');
      }, 2500);
    });
  } catch(e) {
    // clipboard API が使えない環境ではテキストエリアで代替
    showCopyFallback(html);
  }
}

function showCopyFallback(html) {
  // モーダル風のテキストエリアで表示
  const overlay = document.createElement('div');
  overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,0.6);z-index:2000;display:flex;align-items:center;justify-content:center;padding:20px;';
  overlay.innerHTML = `
    <div style="background:#fff;border:3px solid #1a1a2e;border-radius:4px;padding:24px;max-width:560px;width:100%;box-shadow:6px 6px 0 #1a1a2e;">
      <div style="font-weight:900;font-size:16px;margin-bottom:8px;">📋 HTMLをコピーしてね</div>
      <div style="font-size:12px;color:#666;margin-bottom:12px;">全選択（Ctrl+A）→ コピー（Ctrl+C）→ メモ帳に貼り付けて <code>.html</code> で保存</div>
      <textarea style="width:100%;height:200px;font-size:11px;font-family:monospace;border:2px solid #e8e0d4;padding:8px;resize:none;outline:none;" readonly onclick="this.select()">${html.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</textarea>
      <button onclick="this.closest('div[style]').remove()" style="margin-top:12px;background:#1a1a2e;color:#fff;border:none;padding:8px 20px;border-radius:4px;cursor:pointer;font-family:monospace;font-size:12px;">閉じる</button>
    </div>
  `;
  document.body.appendChild(overlay);
  // テキストエリアのHTMLは実際のHTMLコードに差し替え
  overlay.querySelector('textarea').value = html;
  overlay.querySelector('textarea').select();
}

// ── CLEAR ──
function clearAll() {
  if (!confirm('会話とチャートをリセットしてもいい？')) return;
  messages = [];
  currentChartData = null;
  document.getElementById('chatMessages').innerHTML = '';
  document.getElementById('downloadBtn').disabled = true;
  document.getElementById('downloadBar').classList.remove('visible');
  showFlowEmpty();
  addTetoMessage("……（じっとこちらを見ている）\n\nやあ。テトだよ。\nなんか、引っかかってることある？");
}
